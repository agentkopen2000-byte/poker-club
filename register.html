<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Harker School Poker Club</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <nav class="navbar">
    <div class="navbar-inner">
      <div class="navbar-brand">Harker Poker <span class="suit">&hearts;</span></div>
      <ul class="navbar-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="register.html">Register</a></li>
        <li><a href="skill-test.html">Skill Test</a></li>
        <li><a href="brackets.html">Brackets</a></li>
      </ul>
      <div class="navbar-player"></div>
    </div>
  </nav>

  <div class="container">
    <div class="register-wrapper">
      <div class="card">
        <h2 style="text-align: center; margin-bottom: 0.5rem;">Register for the Tournament</h2>
        <p style="text-align: center; color: var(--text-secondary); margin-bottom: 2rem;">
          Enter your name to begin the skill test. Your results will determine your tournament bracket.
        </p>

        <form id="registerForm">
          <div class="form-group">
            <label for="playerName">Your Name</label>
            <input type="text" id="playerName" class="form-input" placeholder="Enter your name" maxlength="30" autocomplete="off">
            <div class="form-error" id="nameError">Please enter your name.</div>
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100;">Start Skill Test</button>
        </form>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="suits">&spades; &hearts; &diams; &clubs;</div>
    <p>Harker School Poker Club &copy; 2026</p>
  </footer>

  <script src="js/storage.js"></script>
  <script src="js/nav.js"></script>
  <script>
    document.getElementById('registerForm').addEventListener('submit', function (e) {
      e.preventDefault();
      var name = document.getElementById('playerName').value.trim();
      var errorEl = document.getElementById('nameError');

      if (!name) {
        errorEl.textContent = 'Please enter your name.';
        errorEl.classList.add('visible');
        return;
      }

      errorEl.classList.remove('visible');
      PokerStorage.setCurrentPlayer(name);
      window.location.href = 'skill-test.html';
    });
  </script>
</body>
</html>
